<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewelry Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>Jewelry Scraper</h1>
      <p>Enter a store URL to extract products, prices &amp; categories</p>
    </header>

    <div class="search-card">
      <div class="search-row">
        <input
          type="url"
          id="url-input"
          placeholder="https://bravojewellers.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="scrape-btn">Scrape</button>
      </div>
    </div>

    <div id="history-card" class="history-card hidden">
      <div class="history-header">
        <span class="history-title">Previous Results</span>
        <span id="history-total" class="history-total"></span>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <div id="log-card" class="log-card hidden">
      <div class="log-header">
        <span id="log-spinner" class="spinner"></span>
        <span class="log-title">Progress</span>
      </div>
      <div id="log"></div>
    </div>

    <div id="error-card" class="error-card hidden">
      <span class="error-icon">⚠</span>
      <span id="error-msg"></span>
    </div>

    <div id="results" class="hidden">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Products</span>
          <span id="stat-count" class="stat-value">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Min Price</span>
          <span id="stat-min" class="stat-value">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Max Price</span>
          <span id="stat-max" class="stat-value">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Avg Price</span>
          <span id="stat-avg" class="stat-value">—</span>
        </div>
      </div>

      <div class="table-card">
        <div class="table-toolbar">
          <div class="toolbar-left">
            <select id="category-filter">
              <option value="">All Categories</option>
            </select>
            <input type="text" id="search-input" placeholder="Search by name…" />
          </div>
          <button id="download-btn" class="btn-secondary">Download CSV</button>
        </div>
        <div id="table"></div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <h3>Price Distribution</h3>
          <canvas id="price-chart"></canvas>
        </div>
        <div class="chart-card" id="cat-chart-card">
          <h3>By Category</h3>
          <canvas id="cat-chart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
